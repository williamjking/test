name: Publish to GitHub Packages
on: workflow_dispatch

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write # This is the magic permission for GitHub Packages
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Generate and Publish
        run: |
          # 1. Variables
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          # 2. Create package.json with the required @scope/name
          echo "{
            \"name\": \"@$OWNER/$REPO_NAME\",
            \"version\": \"1.0.0\",
            \"main\": \"index.js\",
            \"publishConfig\": {
              \"registry\": \"https://npm.pkg.github.com\"
            }
          }" > package.json
          
          echo 'console.log("Hello from GitHub Packages!");' > index.js
          
          # 3. Publish using the built-in GITHUB_TOKEN
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "System: Package configured for GitHub Packages"
          git push
